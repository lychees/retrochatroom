<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>★ 星际驿站 ★ 古早互联网个人主页</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://unpkg.com/jsnes@1.2.1/dist/jsnes.min.js"></script>
</head>
<body>
  <canvas id="starfield"></canvas>

  <div id="app">
    <!-- 登录 -->
    <section id="login-screen" class="screen active">
      <div class="retro-box login-box">
        <h1 class="neon-title">★ 星际驿站 ★</h1>
        <p class="subtitle">欢迎回到 2000 年的互联网</p>
        <div class="form-group">
          <label>你的星际昵称</label>
          <input type="text" id="nickname-input" maxlength="12" placeholder="例如：星际旅人" value="">
        </div>
        <button id="login-btn" class="retro-btn primary">进入大厅</button>
        <div class="hint">按下回车也可以进入</div>
      </div>
    </section>

    <!-- 大厅 -->
    <section id="lobby-screen" class="screen">
      <header class="retro-header">
        <h1 class="neon-title small">★ 星际驿站 ★</h1>
        <div class="header-actions">
          <span id="user-name"></span>
          <button id="create-room-btn" class="retro-btn small">创建房间</button>
        </div>
      </header>
      <main class="lobby-main">
        <div class="room-list-box retro-box">
          <h2>房间列表</h2>
          <div id="room-list" class="room-list"></div>
        </div>
        <div class="lobby-chat-box retro-box">
          <h2>大厅聊天</h2>
          <div id="lobby-messages" class="messages"></div>
          <div class="chat-input-row">
            <input type="text" id="lobby-message-input" maxlength="120" placeholder="在大厅说点什么...">
            <button id="lobby-send-btn" class="retro-btn">发送</button>
          </div>
        </div>
      </main>
    </section>

    <!-- 房间 -->
    <section id="room-screen" class="screen">
      <header class="retro-header">
        <h1 id="room-title" class="neon-title small">房间</h1>
        <div class="header-actions">
          <span id="room-type-badge" class="badge">聊天</span>
          <span id="room-users-count"></span>
          <button id="leave-room-btn" class="retro-btn small danger">离开房间</button>
        </div>
      </header>
      <main class="room-main">
        <div class="room-left">
          <div id="room-canvas-area" class="retro-box canvas-area">
            <!-- 动态内容 -->
          </div>
        </div>
        <div class="room-right retro-box">
          <div class="room-tabs">
            <div class="tab active">聊天</div>
            <div class="tab">在线 (<span id="online-count">0</span>)</div>
          </div>
          <div id="room-users" class="user-list"></div>
          <div id="room-messages" class="messages room-messages"></div>
          <div class="chat-input-row">
            <input type="text" id="room-message-input" maxlength="120" placeholder="在这里聊天...">
            <button id="room-send-btn" class="retro-btn">发送</button>
          </div>
        </div>
      </main>
    </section>
  </div>

  <!-- 创建房间弹窗 -->
  <div id="create-room-modal" class="modal hidden">
    <div class="retro-box modal-box">
      <h2>创建房间</h2>
      <div class="form-group">
        <label>房间名称</label>
        <input type="text" id="new-room-name" maxlength="20" placeholder="例如：深夜茶绘">
      </div>
      <div class="form-group">
        <label>房间类型</label>
        <div class="room-type-grid">
          <button class="type-option active" data-type="chat">聊天</button>
          <button class="type-option" data-type="paint">茶绘</button>
          <button class="type-option" data-type="guess">你画我猜</button>
          <button class="type-option" data-type="fc">FC 模拟器</button>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancel-create-btn" class="retro-btn">取消</button>
        <button id="confirm-create-btn" class="retro-btn primary">创建</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
